name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6

        env:
          GH_TOKEN: ${{ secrets.APP_GITHUB_TOKEN }}
          ENV_FILE: ${{ secrets.APP_ENV_FILE }}
          EC2_HOST: ${{ secrets.EC2_HOST }}

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          port: 22

          timeout: 300s
          command_timeout: 300s

          # 🔥 VERY IMPORTANT (fixes your earlier errors)
          envs: GH_TOKEN,ENV_FILE,EC2_HOST

          script: |
            set -e

            echo "🚀 Starting deployment..."

            # -------------------------------
            # Install Docker (if missing)
            # -------------------------------
            if ! command -v docker >/dev/null 2>&1; then
              echo "📦 Installing Docker..."
              sudo apt update -y
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            sudo systemctl start docker

            # -------------------------------
            # Detect docker compose
            # -------------------------------
            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            else
              COMPOSE="docker-compose"
            fi

            # -------------------------------
            # Clone repo (PRIVATE SAFE)
            # -------------------------------
            if [ ! -d "FitNLive" ]; then
              git clone https://x-access-token:${GH_TOKEN}@github.com/ShaneSunnyKottuppallil/FitNLive.git
            fi

            cd FitNLive

            # -------------------------------
            # HARD CLEAN (critical fix)
            # -------------------------------
            echo "🧹 Cleaning repo..."
            git fetch --all
            git reset --hard origin/main
            git clean -fd

            # ❗ remove workflows from server (prevents recursion bugs)
            rm -rf .github || true

            # -------------------------------
            # ENV setup
            # -------------------------------
            echo "$ENV_FILE" > .env

            # Dynamic injection (NO GitHub interpolation here)
            echo "" >> .env
            echo "# --- Auto-generated ---" >> .env
            echo "BASE_URL=http://${EC2_HOST}" >> .env
            echo "STRAVA_REDIRECT_URI=http://${EC2_HOST}/api/strava/callback" >> .env

            # -------------------------------
            # IMPORTANT FIX (your frontend path)
            # -------------------------------
            # Your index.html is inside frontend/views
            # nginx expects it at /usr/share/nginx/html
            # So copy it before build

            echo "📦 Preparing frontend..."
            cp -r frontend/views/* frontend/ || true

            # -------------------------------
            # Stop old containers
            # -------------------------------
            $COMPOSE -f docker-compose.prod.yml down || true

            # -------------------------------
            # Build
            # -------------------------------
            echo "🐳 Building..."
            $COMPOSE -f docker-compose.prod.yml build

            # -------------------------------
            # Start
            # -------------------------------
            echo "🚀 Starting..."
            $COMPOSE -f docker-compose.prod.yml up -d

            # -------------------------------
            # Debug
            # -------------------------------
            echo "📦 Running containers:"
            docker ps

            echo "🌐 App URL: http://${EC2_HOST}"
            echo "✅ Deployment complete"