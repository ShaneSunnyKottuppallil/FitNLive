name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          port: 22

          script: |
            set -e

            echo "🚀 Starting deployment..."

            # Install Docker if missing
            if ! command -v docker >/dev/null 2>&1; then
              echo "📦 Installing Docker..."
              sudo apt update
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            # Clone repo
            if [ ! -d "FitNLive" ]; then
              git clone https://x-access-token:${{ secrets.APP_GITHUB_TOKEN }}@github.com/ShaneSunnyKottuppallil/FitNLive.git
            fi

            cd FitNLive

            # Pull latest
            git fetch --all
            git reset --hard origin/main

            # Inject ENV
            echo "${{ secrets.APP_ENV_FILE }}" > .env

            # Stop old containers
            docker compose -f docker-compose.prod.yml down || docker-compose -f docker-compose.prod.yml down || true

            # Build
            echo "🐳 Building..."
            docker compose -f docker-compose.prod.yml build || docker-compose -f docker-compose.prod.yml build

            # Start
            echo "🚀 Starting..."
            docker compose -f docker-compose.prod.yml up -d || docker-compose -f docker-compose.prod.yml up -d

            # Debug
            echo "📦 Containers:"
            docker ps

            echo "✅ Deployment complete"