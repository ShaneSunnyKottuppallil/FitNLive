name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        env:
          GH_TOKEN: ${{ secrets.APP_GITHUB_TOKEN }}
          ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 300s
          command_timeout: 300s

          script: |
            set -e

            echo "🚀 Starting deployment..."

            # -------------------------------
            # Install Docker (if missing)
            # -------------------------------
            if ! command -v docker >/dev/null 2>&1; then
              echo "📦 Installing Docker..."
              sudo apt update -y
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            sudo systemctl start docker

            # -------------------------------
            # Detect docker compose
            # -------------------------------
            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            else
              COMPOSE="docker-compose"
            fi

            # -------------------------------
            # Clone repo (PRIVATE SAFE)
            # -------------------------------
            if [ ! -d "FitNLive" ]; then
              git clone https://x-access-token:${GH_TOKEN}@github.com/ShaneSunnyKottuppallil/FitNLive.git
            fi

            cd FitNLive

            # -------------------------------
            # HARD CLEAN (critical)
            # -------------------------------
            echo "🧹 Cleaning repo..."
            git fetch --all
            git reset --hard origin/main
            git clean -fd
            rm -rf .github || true

            # -------------------------------
            # Inject ENV
            # -------------------------------
            echo "$ENV_FILE" > .env

            # -------------------------------
            # Stop old containers
            # -------------------------------
            $COMPOSE -f docker-compose.prod.yml down || true

            # -------------------------------
            # Build
            # -------------------------------
            echo "🐳 Building..."
            $COMPOSE -f docker-compose.prod.yml build

            # -------------------------------
            # Start
            # -------------------------------
            echo "🚀 Starting..."
            $COMPOSE -f docker-compose.prod.yml up -d

            # -------------------------------
            # Debug
            # -------------------------------
            echo "📦 Running containers:"
            docker ps

            echo "✅ Deployment complete"