name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            echo "🚀 Starting deployment..."

            # -------------------------------
            # Install Docker (official repo)
            # -------------------------------
            if ! command -v docker &> /dev/null; then
              echo "🔧 Installing Docker..."

              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg

              sudo install -m 0755 -d /etc/apt/keyrings

              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
                sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg

              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
                $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

              sudo apt-get update -y

              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

              sudo systemctl start docker
              sudo systemctl enable docker

              sudo usermod -aG docker ubuntu
            fi

            # -------------------------------
            # Docker command fallback
            # -------------------------------
            DOCKER_CMD="docker"
            if ! groups ubuntu | grep -q docker; then
              DOCKER_CMD="sudo docker"
            fi

            # -------------------------------
            # Clone repo (private)
            # -------------------------------
            if [ ! -d "FitNLive" ]; then
              git clone https://x-access-token:${{ secrets.APP_GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            fi

            cd FitNLive

            # -------------------------------
            # Pull latest changes
            # -------------------------------
            git pull https://x-access-token:${{ secrets.APP_GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main

            # -------------------------------
            # Inject environment variables
            # -------------------------------
            echo "${{ secrets.APP_ENV_FILE }}" > .env

            # -------------------------------
            # Deploy containers
            # -------------------------------
            $DOCKER_CMD compose -f docker-compose.prod.yml down || true
            $DOCKER_CMD compose -f docker-compose.prod.yml up -d --build

            echo "✅ Deployment complete"