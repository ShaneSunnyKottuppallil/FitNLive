name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6

        env:
          GH_TOKEN: ${{ secrets.APP_GITHUB_TOKEN }}
          ENV_FILE: ${{ secrets.APP_ENV_FILE }}
          EC2_HOST: ${{ secrets.EC2_HOST }}

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 300s
          command_timeout: 300s
          envs: GH_TOKEN,ENV_FILE,EC2_HOST

          script: |
            set -e
            echo "Starting deployment..."

            # Install Docker
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt update -y
              sudo apt install -y docker.io

              sudo systemctl start docker
              sudo systemctl enable docker

              sudo usermod -aG docker ubuntu
            fi

            # Install docker-compose (standalone v1)
            if ! command -v docker-compose >/dev/null 2>&1; then
              sudo curl -L https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
                -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            # Ensure docker running
            sudo systemctl start docker

            # Fix permission
            sudo chmod 666 /var/run/docker.sock

            COMPOSE="docker-compose"

            # Clone repo
            if [ ! -d "FitNLive" ]; then
              git clone https://x-access-token:${GH_TOKEN}@github.com/ShaneSunnyKottuppallil/FitNLive.git
            fi

            cd FitNLive

            # Clean repo
            git fetch --all
            git reset --hard origin/main
            git clean -fd
            rm -rf .github || true

            # ENV
            printf "%s" "$ENV_FILE" > .env
            echo "" >> .env
            echo "BASE_URL=http://${EC2_HOST}" >> .env
            echo "STRAVA_REDIRECT_URI=http://${EC2_HOST}/api/strava/callback" >> .env

            # Stop containers
            $COMPOSE -f docker-compose.prod.yml down || true

            # Cleanup safely
            docker ps -aq | xargs -r docker rm -f
            docker system prune -af || true

            # Build & start
            $COMPOSE -f docker-compose.prod.yml build
            $COMPOSE -f docker-compose.prod.yml up -d

            # Debug
            docker ps

            echo "Backend logs:"
            docker logs fitnlive-backend-1 || true

            echo "Nginx logs:"
            docker logs fitnlive-nginx-1 || true

            echo "http://${EC2_HOST}"
            echo "Deployment complete"