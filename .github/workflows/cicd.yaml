name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          port: 22

          script: |
            set -e

            echo "🚀 Starting deployment..."

            # -------------------------------
            # Install Docker (lightweight)
            # -------------------------------
            if ! command -v docker &> /dev/null; then
              echo "📦 Installing Docker..."
              sudo apt update
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            # -------------------------------
            # Fix for DOCKER_CMD (no $ issues)
            # -------------------------------
            if docker compose version &> /dev/null; then
              COMPOSE="docker compose"
            else
              COMPOSE="docker-compose"
            fi

            # -------------------------------
            # Clone repo (SAFE)
            # -------------------------------
            if [ ! -d "FitNLive" ]; then
              git clone https://x-access-token:${{ secrets.APP_GITHUB_TOKEN }}@github.com/ShaneSunnyKottuppallil/FitNLive.git
            fi

            cd FitNLive

            # -------------------------------
            # Pull latest code (clean)
            # -------------------------------
            git fetch --all
            git reset --hard origin/main

            # -------------------------------
            # Inject ENV
            # -------------------------------
            echo "${{ secrets.APP_ENV_FILE }}" > .env

            # -------------------------------
            # Stop old containers
            # -------------------------------
            $COMPOSE -f docker-compose.prod.yml down || true

            # -------------------------------
            # Build + Start (safe split)
            # -------------------------------
            echo "🐳 Building..."
            $COMPOSE -f docker-compose.prod.yml build

            echo "🚀 Starting..."
            $COMPOSE -f docker-compose.prod.yml up -d

            # -------------------------------
            # Debug output
            # -------------------------------
            echo "📦 Containers:"
            docker ps

            echo "✅ Deployment complete"