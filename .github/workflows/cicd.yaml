name: Deploy Securely

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/FitInLive || git clone https://github.com/<your-username>/FitInLive.git && cd FitInLive

            git pull origin main

            # 🔐 Inject env securely
            cat <<EOF > .env
${{ secrets.APP_ENV_FILE }}
EOF

            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d --build