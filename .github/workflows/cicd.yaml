name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        env:
          GH_TOKEN: ${{ secrets.APP_GITHUB_TOKEN }}
          ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          port: 22

          script: |
            set -e

            echo "🚀 Starting deployment..."

            # -------------------------------
            # Install Docker (only if needed)
            # -------------------------------
            if ! command -v docker >/dev/null 2>&1; then
              echo "📦 Installing Docker..."
              sudo apt update -y
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            sudo systemctl start docker

            # -------------------------------
            # Clone repo if not exists
            # -------------------------------
            if [ ! -d "FitNLive" ]; then
              git clone https://x-access-token:${GH_TOKEN}@github.com/ShaneSunnyKottuppallil/FitNLive.git
            fi

            cd FitNLive

            # -------------------------------
            # HARD CLEAN (THIS FIXES YOUR ISSUE)
            # -------------------------------
            echo "🧹 Cleaning old files..."
            git fetch --all
            git reset --hard origin/main
            git clean -fd   # 🔥 removes .github and any leftover junk

            # Extra safety (explicit remove)
            rm -rf .github || true

            # -------------------------------
            # Inject ENV
            # -------------------------------
            echo "$ENV_FILE" > .env

            # -------------------------------
            # Stop old containers
            # -------------------------------
            docker compose -f docker-compose.prod.yml down || true

            # -------------------------------
            # Build containers
            # -------------------------------
            echo "🐳 Building..."
            docker compose -f docker-compose.prod.yml build

            # -------------------------------
            # Start containers
            # -------------------------------
            echo "🚀 Starting..."
            docker compose -f docker-compose.prod.yml up -d

            # -------------------------------
            # Debug info
            # -------------------------------
            echo "📦 Running containers:"
            docker ps

            echo "✅ Deployment complete"