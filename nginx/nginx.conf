events {}

http {
  server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # -----------------------------
    # LOGIN / SIGNUP PAGES → BACKEND
    # -----------------------------
    location = /login {
      proxy_pass http://backend:5000/login;
    }

    location = /signup {
      proxy_pass http://backend:5000/signup;
    }

    location = /profile {
      proxy_pass http://backend:5000/profile;
    }

    location = /chat {
      proxy_pass http://backend:5000/chat;
    }

    # -----------------------------
    # AUTH APIs
    # -----------------------------
    location /auth/ {
      proxy_pass http://backend:5000/auth/;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # -----------------------------
    # API ROUTES
    # -----------------------------
    location /api/ {
      proxy_pass http://backend:5000;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # -----------------------------
    # STATIC FILES
    # -----------------------------
    location / {
      try_files $uri $uri.html /index.html;
    }
  }
}