events {}

http {
  server {
    listen 80;

    # -----------------------------
    # FRONTEND (SPA FIX)
    # -----------------------------
    location / {
      root /usr/share/nginx/html;
      index index.html;

      # 🔥 THIS LINE FIXES YOUR ISSUE
      try_files $uri $uri/ /index.html;
    }

    # -----------------------------
    # BACKEND API
    # -----------------------------
    location /api/ {
      proxy_pass http://backend:5000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}