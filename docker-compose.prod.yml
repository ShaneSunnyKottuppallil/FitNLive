version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/views:/usr/share/nginx/html:ro

    depends_on:
      - backend

    restart: always

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    expose:
      - "5000"

    env_file:
      - .env

    depends_on:
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy

    restart: always

  mongodb:
    image: mongo:6
    volumes:
      - mongo_data:/data/db

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: always

  mysql:
    image: mysql:8

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init/schema.sql:/docker-entrypoint-initdb.d/schema.sql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: always

volumes:
  mongo_data:
  mysql_data: