version: '3.8'

services:
  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    restart: always

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mongodb     # ✅ no health blocking
      - mysql
    restart: always

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: always

  mongodb:
    image: mongo:6
    volumes:
      - mongo_data:/data/db
    restart: always
    # ✅ removed healthcheck (optional for now)

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: always
    # ✅ removed fragile healthcheck

volumes:
  mongo_data:
  mysql_data: