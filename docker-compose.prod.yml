name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          port: 22

          timeout: 300s
          command_timeout: 300s

          script: |
            set -e

            echo "🚀 Starting deployment..."

            # -------------------------------
            # Install Docker (only if needed)
            # -------------------------------
            if ! command -v docker &> /dev/null; then
              echo "📦 Installing Docker..."
              sudo apt update
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            # -------------------------------
            # Detect docker compose version
            # -------------------------------
            if docker compose version &> /dev/null; then
              DOCKER_CMD="docker compose"
            else
              DOCKER_CMD="docker-compose"
            fi

            # -------------------------------
            # Clone repo (private safe)
            # -------------------------------
            if [ ! -d "FitNLive" ]; then
              git clone https://x-access-token:${{ secrets.APP_GITHUB_TOKEN }}@github.com/ShaneSunnyKottuppallil/FitNLive.git
            fi

            cd FitNLive

            # -------------------------------
            # Pull latest code
            # -------------------------------
            git fetch --all
            git reset --hard origin/main

            # -------------------------------
            # Inject ENV
            # -------------------------------
            echo "${{ secrets.APP_ENV_FILE }}" > .env

            # -------------------------------
            # Stop old containers
            # -------------------------------
            $DOCKER_CMD -f docker-compose.prod.yml down || true

            # -------------------------------
            # Build & Start (separated)
            # -------------------------------
            echo "🐳 Building containers..."
            $DOCKER_CMD -f docker-compose.prod.yml build

            echo "🚀 Starting containers..."
            $DOCKER_CMD -f docker-compose.prod.yml up -d

            # -------------------------------
            # Debug visibility
            # -------------------------------
            echo "📦 Running containers:"
            docker ps

            echo "✅ Deployment complete"